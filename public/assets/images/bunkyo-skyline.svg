  </g>
  <!-- Clover 4 (mid left) -->
  <g transform="translate(320, 150) scale(0.3)" opacity="0.15">
    <path d="M0 -12 C-8 -20 -20 -12 -12 0 C-20 8 -8 20 0 12 C8 20 20 8 12 0 C20 -12 8 -20 0 -12Z" stroke="#006B3C" stroke-width="2.5" fill="none"/>
    <line x1="0" y1="12" x2="4" y2="28" stroke="#006B3C" stroke-width="2"/>
  </g>

  <!-- === Checker pattern (市松模様 - matching logo) === -->
  <g opacity="0.25">
    <rect x="0" y="396" width="8" height="4" fill="#006B3C"/>
    <rect x="16" y="396" width="8" height="4" fill="#006B3C"/>
    <rect x="32" y="396" width="8" height="4" fill="#006B3C"/>
    <rect x="48" y="396" width="8" height="4" fill="#006B3C"/>
    <rect x="64" y="396" width="8" height="4" fill="#006B3C"/>
    <rect x="80" y="396" width="8" height="4" fill="#006B3C"/>
    <rect x="96" y="396" width="8" height="4" fill="#006B3C"/>
    <rect x="112" y="396" width="8" height="4" fill="#006B3C"/>
    <rect x="128" y="396" width="8" height="4" fill="#006B3C"/>
    <rect x="144" y="396" width="8" height="4" fill="#006B3C"/>
    <rect x="1040" y="396" width="8" height="4" fill="#006B3C"/>
    <rect x="1056" y="396" width="8" height="4" fill="#006B3C"/>
    <rect x="1072" y="396" width="8" height="4" fill="#006B3C"/>
    <rect x="1088" y="396" width="8" height="4" fill="#006B3C"/>
    <rect x="1104" y="396" width="8" height="4" fill="#006B3C"/>
    <rect x="1120" y="396" width="8" height="4" fill="#006B3C"/>
    <rect x="1136" y="396" width="8" height="4" fill="#006B3C"/>
    <rect x="1152" y="396" width="8" height="4" fill="#006B3C"/>
    <rect x="1168" y="396" width="8" height="4" fill="#006B3C"/>
    <rect x="1184" y="396" width="8" height="4" fill="#006B3C"/>
