    <rect x="30" y="384" width="80" height="4" rx="1" stroke="#8CC63F" stroke-width="1" fill="none" opacity="0.25"/>
    <rect x="25" y="390" width="90" height="4" rx="1" stroke="#8CC63F" stroke-width="1" fill="none" opacity="0.2"/>
  </g>

