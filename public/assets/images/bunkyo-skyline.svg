    <rect x="0" y="220" width="20" height="160" rx="2" stroke="#006B3C" stroke-width="2.5" fill="none" opacity="0.7"/>
    <rect x="140" y="220" width="20" height="160" rx="2" stroke="#006B3C" stroke-width="2.5" fill="none" opacity="0.7"/>
    <!-- Inner pillars -->
