  <!-- === 湯島天神 鳥居 (Torii gate) === -->
  <g transform="translate(820, 0)">
    <!-- Main pillars -->
    <line x1="20" y1="250" x2="20" y2="380" stroke="#006B3C" stroke-width="3" opacity="0.7"/>
    <line x1="120" y1="250" x2="120" y2="380" stroke="#006B3C" stroke-width="3" opacity="0.7"/>
