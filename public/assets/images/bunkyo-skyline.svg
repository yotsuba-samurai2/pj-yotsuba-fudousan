    <path d="M225 280 L260 255 L295 280" stroke="#006B3C" stroke-width="2" fill="none" opacity="0.5"/>
    <!-- windows -->
    <rect x="240" y="295" width="14" height="14" rx="1" stroke="#8CC63F" stroke-width="1.5" fill="none" opacity="0.4"/>
    <rect x="266" y="295" width="14" height="14" rx="1" stroke="#8CC63F" stroke-width="1.5" fill="none" opacity="0.4"/>
