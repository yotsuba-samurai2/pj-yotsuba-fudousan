    <path d="M0 -12 C-8 -20 -20 -12 -12 0 C-20 8 -8 20 0 12 C8 20 20 8 12 0 C20 -12 8 -20 0 -12Z" stroke="#006B3C" stroke-width="2.5" fill="none"/>
    <line x1="0" y1="12" x2="4" y2="28" stroke="#006B3C" stroke-width="2"/>
