    <!-- clock/ornament circle -->
    <circle cx="690" cy="225" r="12" stroke="#006B3C" stroke-width="1.5" fill="none" opacity="0.5"/>
    <!-- windows row 1 -->
    <rect x="652" y="250" width="14" height="20" rx="1" stroke="#8CC63F" stroke-width="1.5" fill="none" opacity="0.4"/>
    <rect x="676" y="250" width="14" height="20" rx="1" stroke="#8CC63F" stroke-width="1.5" fill="none" opacity="0.4"/>
    <rect x="700" y="250" width="14" height="20" rx="1" stroke="#8CC63F" stroke-width="1.5" fill="none" opacity="0.4"/>
    <rect x="724" y="250" width="14" height="20" rx="1" stroke="#8CC63F" stroke-width="1.5" fill="none" opacity="0.4"/>
    <!-- windows row 2 -->
    <rect x="652" y="285" width="14" height="20" rx="1" stroke="#8CC63F" stroke-width="1.5" fill="none" opacity="0.4"/>
    <rect x="676" y="285" width="14" height="20" rx="1" stroke="#8CC63F" stroke-width="1.5" fill="none" opacity="0.4"/>
    <rect x="700" y="285" width="14" height="20" rx="1" stroke="#8CC63F" stroke-width="1.5" fill="none" opacity="0.4"/>
    <rect x="724" y="285" width="14" height="20" rx="1" stroke="#8CC63F" stroke-width="1.5" fill="none" opacity="0.4"/>
