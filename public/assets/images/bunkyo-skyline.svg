      <rect x="1012" y="182" width="10" height="12" rx="1" stroke="#8CC63F" stroke-width="1.2" fill="none"/>
      <rect x="1030" y="182" width="10" height="12" rx="1" stroke="#8CC63F" stroke-width="1.2" fill="none"/>
      <rect x="1048" y="182" width="10" height="12" rx="1" stroke="#8CC63F" stroke-width="1.2" fill="none"/>
      <rect x="1012" y="206" width="10" height="12" rx="1" stroke="#8CC63F" stroke-width="1.2" fill="none"/>
