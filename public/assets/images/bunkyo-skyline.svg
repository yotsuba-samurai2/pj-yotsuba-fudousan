    <rect x="118" y="250" width="12" height="130" rx="1" stroke="#006B3C" stroke-width="2" fill="none" opacity="0.5"/>
    <!-- Roof (traditional curved) -->
    <path d="M-15 220 Q10 195 80 185 Q150 195 175 220" stroke="#006B3C" stroke-width="2.5" fill="none" opacity="0.7"/>
    <path d="M-10 228 Q10 205 80 196 Q150 205 170 228" stroke="#8CC63F" stroke-width="2" fill="none" opacity="0.5"/>
    <!-- Ridge decoration -->
    <path d="M65 185 L80 170 L95 185" stroke="#006B3C" stroke-width="2" fill="none" opacity="0.6"/>
    <!-- Gate beam -->
    <line x1="20" y1="260" x2="140" y2="260" stroke="#006B3C" stroke-width="2" opacity="0.5"/>
    <line x1="20" y1="280" x2="140" y2="280" stroke="#8CC63F" stroke-width="1.5" opacity="0.3"/>
    <!-- Side roof wings -->
    <path d="M20 248 Q-5 240 -20 250" stroke="#006B3C" stroke-width="2" fill="none" opacity="0.5"/>
    <path d="M140 248 Q165 240 180 250" stroke="#006B3C" stroke-width="2" fill="none" opacity="0.5"/>
  </g>

