    <path d="M5 250 Q70 238 135 250" stroke="#006B3C" stroke-width="3" fill="none" opacity="0.7"/>
    <!-- Shimaki (second beam) -->
    <line x1="10" y1="258" x2="130" y2="258" stroke="#006B3C" stroke-width="2" opacity="0.6"/>
    <!-- Nuki (horizontal beam) -->
    <line x1="20" y1="280" x2="120" y2="280" stroke="#8CC63F" stroke-width="2.5" opacity="0.5"/>
    <!-- Gakuzuka (tablet) -->
    <rect x="52" y="262" width="36" height="14" rx="2" stroke="#006B3C" stroke-width="1.5" fill="none" opacity="0.5"/>
    <!-- Pillar bases -->
    <rect x="12" y="370" width="16" height="10" rx="1" stroke="#006B3C" stroke-width="1.5" fill="none" opacity="0.5"/>
    <rect x="112" y="370" width="16" height="10" rx="1" stroke="#006B3C" stroke-width="1.5" fill="none" opacity="0.5"/>
    <!-- Stone steps -->
