<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" fill="none">
  <defs>
    <!-- Logo color palette -->
    <linearGradient id="green-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#006B3C"/>
      <stop offset="100%" stop-color="#8CC63F"/>
    </linearGradient>
    <linearGradient id="light-green-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8CC63F" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#006B3C" stop-opacity="0.1"/>
    </linearGradient>
  </defs>

  <!-- === Sloped street (文京区の坂道) === -->
  <path d="M0 380 Q300 340 600 350 Q900 360 1200 330 L1200 400 L0 400Z" fill="#006B3C" opacity="0.08"/>
  <path d="M0 385 Q300 350 600 358 Q900 365 1200 340" stroke="#006B3C" stroke-width="2" opacity="0.3"/>

  <!-- === Background trees (六義園の木々) === -->
  <g opacity="0.15">
    <circle cx="80" cy="280" r="40" fill="#8CC63F"/>
    <circle cx="60" cy="270" r="35" fill="#006B3C"/>
    <rect x="68" y="310" width="6" height="30" fill="#006B3C"/>
  </g>
  <g opacity="0.12">
    <circle cx="180" cy="290" r="30" fill="#8CC63F"/>
    <circle cx="165" cy="282" r="28" fill="#006B3C"/>
    <rect x="172" y="312" width="5" height="25" fill="#006B3C"/>
  </g>
  <g opacity="0.1">
    <circle cx="1050" cy="275" r="35" fill="#8CC63F"/>
    <circle cx="1035" cy="268" r="32" fill="#006B3C"/>
    <rect x="1042" y="300" width="5" height="28" fill="#006B3C"/>
  </g>

  <!-- === Building 1: マンション (left) === -->
  <g>
    <rect x="120" y="180" width="80" height="200" rx="2" stroke="#006B3C" stroke-width="2" fill="none" opacity="0.6"/>
    <!-- windows -->
    <rect x="132" y="195" width="12" height="16" rx="1" stroke="#8CC63F" stroke-width="1.5" fill="none" opacity="0.5"/>
    <rect x="152" y="195" width="12" height="16" rx="1" stroke="#8CC63F" stroke-width="1.5" fill="none" opacity="0.5"/>
    <rect x="172" y="195" width="12" height="16" rx="1" stroke="#8CC63F" stroke-width="1.5" fill="none" opacity="0.5"/>
    <rect x="132" y="225" width="12" height="16" rx="1" stroke="#8CC63F" stroke-width="1.5" fill="none" opacity="0.5"/>
    <rect x="152" y="225" width="12" height="16" rx="1" stroke="#8CC63F" stroke-width="1.5" fill="none" opacity="0.5"/>
    <rect x="172" y="225" width="12" height="16" rx="1" stroke="#8CC63F" stroke-width="1.5" fill="none" opacity="0.5"/>
    <rect x="132" y="255" width="12" height="16" rx="1" stroke="#8CC63F" stroke-width="1.5" fill="none" opacity="0.5"/>
    <rect x="152" y="255" width="12" height="16" rx="1" stroke="#8CC63F" stroke-width="1.5" fill="none" opacity="0.5"/>
    <rect x="172" y="255" width="12" height="16" rx="1" stroke="#8CC63F" stroke-width="1.5" fill="none" opacity="0.5"/>
    <rect x="132" y="285" width="12" height="16" rx="1" stroke="#8CC63F" stroke-width="1.5" fill="none" opacity="0.5"/>
    <rect x="152" y="285" width="12" height="16" rx="1" stroke="#8CC63F" stroke-width="1.5" fill="none" opacity="0.5"/>
    <rect x="172" y="285" width="12" height="16" rx="1" stroke="#8CC63F" stroke-width="1.5" fill="none" opacity="0.5"/>
    <!-- entrance -->
    <rect x="148" y="345" width="24" height="35" rx="2" stroke="#006B3C" stroke-width="1.5" fill="none" opacity="0.5"/>
  </g>

  <!-- === Building 2: 低層住宅 with slope === -->
  <g>
    <rect x="230" y="280" width="60" height="100" rx="2" stroke="#006B3C" stroke-width="2" fill="none" opacity="0.5"/>
