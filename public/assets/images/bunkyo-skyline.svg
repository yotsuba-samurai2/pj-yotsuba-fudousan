    <rect x="1118" y="352" width="16" height="28" rx="1" stroke="#006B3C" stroke-width="1.2" fill="none" opacity="0.35"/>
  </g>

  <!-- === 四つ葉クローバー装飾 (scattered) === -->
  <!-- Clover 1 (top left) -->
  <g transform="translate(50, 60) scale(0.5)" opacity="0.25">
    <path d="M0 -12 C-8 -20 -20 -12 -12 0 C-20 8 -8 20 0 12 C8 20 20 8 12 0 C20 -12 8 -20 0 -12Z" stroke="#8CC63F" stroke-width="2.5" fill="none"/>
