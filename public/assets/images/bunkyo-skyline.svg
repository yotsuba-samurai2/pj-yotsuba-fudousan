      <rect x="1012" y="230" width="10" height="12" rx="1" stroke="#8CC63F" stroke-width="1.2" fill="none"/>
      <rect x="1030" y="230" width="10" height="12" rx="1" stroke="#8CC63F" stroke-width="1.2" fill="none"/>
      <rect x="1048" y="230" width="10" height="12" rx="1" stroke="#8CC63F" stroke-width="1.2" fill="none"/>
      <rect x="1012" y="254" width="10" height="12" rx="1" stroke="#8CC63F" stroke-width="1.2" fill="none"/>
      <rect x="1030" y="254" width="10" height="12" rx="1" stroke="#8CC63F" stroke-width="1.2" fill="none"/>
      <rect x="1048" y="254" width="10" height="12" rx="1" stroke="#8CC63F" stroke-width="1.2" fill="none"/>
      <rect x="1012" y="278" width="10" height="12" rx="1" stroke="#8CC63F" stroke-width="1.2" fill="none"/>
      <rect x="1030" y="278" width="10" height="12" rx="1" stroke="#8CC63F" stroke-width="1.2" fill="none"/>
      <rect x="1048" y="278" width="10" height="12" rx="1" stroke="#8CC63F" stroke-width="1.2" fill="none"/>
    </g>
    <!-- rooftop -->
    <rect x="1020" y="132" width="30" height="10" rx="1" stroke="#006B3C" stroke-width="1.5" fill="none" opacity="0.4"/>
  </g>

